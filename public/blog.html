<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログへ移動中 - 徳之島町立亀津小学校</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .redirect-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .redirect-content {
            max-width: 600px;
        }
        
        .redirect-icon {
            font-size: 4rem;
            margin-bottom: 2rem;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .redirect-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        .redirect-message {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .redirect-url {
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            word-break: break-all;
        }
        
        .redirect-button {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .redirect-button:hover {
            transform: translateY(-2px);
        }
        
        .back-link {
            margin-top: 2rem;
        }
        
        .back-link a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }
        
        .back-link a:hover {
            opacity: 1;
            text-decoration: underline;
        }
        
        .countdown {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="redirect-content">
            <div class="redirect-icon">
                <i class="fas fa-external-link-alt"></i>
            </div>
            <h1 class="redirect-title">ブログページへ移動します</h1>
            <p class="redirect-message" id="redirect-message">外部のブログサイトに移動します...</p>
            <div class="redirect-url" id="redirect-url">URLを読み込み中...</div>
            <a href="#" class="redirect-button" id="redirect-button">
                <i class="fas fa-arrow-right"></i> 今すぐ移動
            </a>
            <div class="countdown" id="countdown"></div>
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> ホームに戻る</a>
            </div>
        </div>
    </div>
    
    <script>
        // ブログURLを取得
        async function getBlogUrl() {
            try {
                const response = await fetch('/api/tables/site_settings?setting_key=blog_external_url');
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    return data.data[0].setting_value;
                }
                
                // デフォルトURL（設定がない場合）
                return 'https://blog.example.com';
            } catch (error) {
                console.error('ブログURLの取得に失敗:', error);
                // デフォルトURL
                return 'https://blog.example.com';
            }
        }
        
        // カウントダウンとリダイレクト
        async function startRedirect() {
            const blogUrl = await getBlogUrl();
            
            // URLを表示
            document.getElementById('redirect-url').textContent = blogUrl;
            document.getElementById('redirect-button').href = blogUrl;
            
            // カウントダウン開始
            let seconds = 3;
            const countdownEl = document.getElementById('countdown');
            
            const updateCountdown = () => {
                if (seconds > 0) {
                    countdownEl.textContent = `${seconds}秒後に自動的に移動します...`;
                    seconds--;
                    setTimeout(updateCountdown, 1000);
                } else {
                    // リダイレクト実行
                    window.location.href = blogUrl;
                }
            };
            
            updateCountdown();
        }
        
        // ページ読み込み時に実行
        window.addEventListener('DOMContentLoaded', startRedirect);
    </script>
</body>
</html>
