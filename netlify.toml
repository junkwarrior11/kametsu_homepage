[build]
  command = "npm run build:netlify"
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/tables/*"
  to = "/.netlify/functions/tables/:splat"
  status = 200

[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth"
  status = 200

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"
